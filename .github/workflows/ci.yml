name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check
        run: |
          python -m py_compile scripts/score.py scripts/run_once.py

      - name: Run demo decision loop
        run: |
          python scripts/run_once.py \
            --base examples/base.metrics.example.json \
            --candidate examples/candidate.metrics.example.json \
            --results /tmp/results.tsv > /tmp/run_once_output.json
          grep '"decision": "keep"' /tmp/run_once_output.json
          test -f /tmp/results.tsv
