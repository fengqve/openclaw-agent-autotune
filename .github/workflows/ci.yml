name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 */12 * * *' # every 12 hours (UTC)
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check
        run: |
          python -m py_compile scripts/score.py scripts/run_once.py

      - name: Run auto demo
        run: |
          python scripts/run_once.py \
            --base examples/base.metrics.example.json \
            --candidate examples/candidate.metrics.example.json \
            --results /tmp/results.tsv > /tmp/run_once_output.json
          cat /tmp/run_once_output.json
          grep '"decision": "keep"\|"decision": "rollback"' /tmp/run_once_output.json
          test -f /tmp/results.tsv

      - name: Publish run summary
        run: |
          decision=$(python - <<'PY'
import json
with open('/tmp/run_once_output.json','r',encoding='utf-8') as f:
    data=json.load(f)
print(data['decision'])
PY
)
          base=$(python - <<'PY'
import json
with open('/tmp/run_once_output.json','r',encoding='utf-8') as f:
    data=json.load(f)
print(data['base_score'])
PY
)
          cand=$(python - <<'PY'
import json
with open('/tmp/run_once_output.json','r',encoding='utf-8') as f:
    data=json.load(f)
print(data['candidate_score'])
PY
)
          note=$(python - <<'PY'
import json
with open('/tmp/run_once_output.json','r',encoding='utf-8') as f:
    data=json.load(f)
print(data['note'])
PY
)
          {
            echo "## OpenClaw Agent Autotune Auto Demo";
            echo "";
            echo "| Metric | Value |";
            echo "|---|---|";
            echo "| base_score | ${base} |";
            echo "| candidate_score | ${cand} |";
            echo "| decision | ${decision} |";
            echo "| note | ${note} |";
            echo "";
            echo "Policy: only keep changes when metrics improve and hard gates pass.";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload demo output artifact
        uses: actions/upload-artifact@v4
        with:
          name: autotune-demo-output
          path: |
            /tmp/run_once_output.json
            /tmp/results.tsv
