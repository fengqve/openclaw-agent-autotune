name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 */12 * * *' # every 12 hours (UTC)
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check
        run: |
          python -m py_compile scripts/score.py scripts/run_once.py

      - name: Run auto demo
        run: |
          python scripts/run_once.py \
            --base examples/base.metrics.example.json \
            --candidate examples/candidate.metrics.example.json \
            --change-meta examples/change.example.json \
            --report-md /tmp/decision_report.md \
            --results /tmp/results.tsv > /tmp/run_once_output.json
          cat /tmp/run_once_output.json
          test -f /tmp/results.tsv
          test -f /tmp/decision_report.md

      - name: Publish readable summary
        run: |
          echo "## OpenClaw Agent Autotune Auto Demo" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/decision_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload demo output artifact
        uses: actions/upload-artifact@v4
        with:
          name: autotune-demo-output
          path: |
            /tmp/run_once_output.json
            /tmp/results.tsv
            /tmp/decision_report.md
